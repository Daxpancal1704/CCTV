{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart CCTV Monitoring System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #111827;
            --card-border: #1e2d45;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --input-bg: #1a2235;
            --input-border: #1e2d45;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            font-size: 32px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            margin: 0 auto 20px;
        }
        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: var(--input-bg);
            color: var(--text-primary);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
    <h3 class="fw-bold mb-1">Welcome Back</h3>
    <p class="text-secondary mb-4">Sign in to Smart CCTV Dashboard</p>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label class="form-label text-secondary" style="font-size: 0.85rem; font-weight: 600;">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label text-secondary" style="font-size: 0.85rem; font-weight: 600;">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        {% if form.errors %}
            <p style="color: #ef4444; font-size: 0.85rem; margin-top: -15px; margin-bottom: 15px;">Invalid username or password.</p>
        {% endif %}
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
        <input type="hidden" name="next" value="{{ next|default:'/' }}">
    </form>
</div>

</body>
</html>
